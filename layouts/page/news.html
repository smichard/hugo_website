{{ define "content" -}}
<div class="post-warp">
    <header class="post-header">
        <h2 class="post-title">{{ .Title }}</h2>
    </header>
    <div class="post-content">
        {{ with .Content }}<div class="news-intro">{{ . }}</div>{{ end }}

        <div id="feed-loading" class="feed-loading">Loading latest posts...</div>
        <div id="feed-error" class="feed-error" style="display:none;"></div>
        <div id="feed-grid" class="feed-grid"></div>
    </div>
</div>

<style>
.news-intro {
    margin-bottom: 2rem;
}

.feed-loading {
    text-align: center;
    padding: 40px;
    color: #888;
}

.feed-error {
    text-align: center;
    padding: 20px;
    color: #f92672;
}

.feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 8px 0 24px;
}

.feed-card {
    display: flex;
    flex-direction: column;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #4a4b50;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.feed-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.feed-card-media {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
}

.feed-card-image {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    max-width: none !important;
    max-height: none !important;
    object-fit: cover !important;
    object-position: center !important;
    display: block;
}

.feed-card-image-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0d2233 0%, #1e3a4f 60%, #153045 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.feed-card-favicon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    object-fit: contain;
    opacity: 0.85;
}

.feed-card-domain {
    font-size: 0.72rem;
    color: #5a8aaa;
    letter-spacing: 0.04em;
    text-transform: lowercase;
}

.feed-card-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 16px;
    gap: 8px;
}

.feed-card-date {
    font-size: 0.75rem;
    color: #7a9bb5;
}

.feed-card-title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0;
}

.feed-card-title::before {
    content: none !important;
}

.feed-card-title a {
    text-decoration: none;
    color: inherit;
}

.feed-card-title a:hover {
    color: #2d96bd;
}

.feed-card-desc {
    font-size: 0.85rem;
    line-height: 1.5;
    color: #a9a9b3;
    flex: 1;
    margin: 0;
}

.feed-card-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.8rem;
    color: #2d96bd;
    text-decoration: none;
}

.feed-card-link:hover {
    color: #fff;
}

@media (max-width: 900px) {
    .feed-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 580px) {
    .feed-grid { grid-template-columns: 1fr; }
}
</style>

<script>
(function () {
    var FEED_URL = '{{ .Params.feedURL }}';
    var MAX_ITEMS = 18;
    var MAX_DESC  = 120;

    var grid    = document.getElementById('feed-grid');
    var loading = document.getElementById('feed-loading');
    var error   = document.getElementById('feed-error');

    function getText(el, tag, ns) {
        var node = ns ? el.getElementsByTagNameNS(ns, tag)[0] : el.getElementsByTagName(tag)[0];
        return node ? (node.textContent || '').trim() : '';
    }

    function getThumbnail(item) {
        // <media:content url="..." medium="image" />
        var mediaContent = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0];
        if (mediaContent && mediaContent.getAttribute('url')) return mediaContent.getAttribute('url');
        // <enclosure url="..." type="image/..." />
        var enclosure = item.getElementsByTagName('enclosure')[0];
        if (enclosure && (enclosure.getAttribute('type') || '').startsWith('image/')) return enclosure.getAttribute('url');
        return null;
    }

    function stripHtml(html) {
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }

    function truncate(text, max) {
        text = text.trim();
        return text.length > max ? text.slice(0, max).replace(/\s+\S*$/, '') + '…' : text;
    }

    function formatDate(dateStr) {
        var d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getDomain(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); } catch(e) { return ''; }
    }

    function makePlaceholder(link) {
        var domain = getDomain(link);
        var ph = document.createElement('div');
        ph.className = 'feed-card-image-placeholder';

        if (domain) {
            var favicon = document.createElement('img');
            favicon.className = 'feed-card-favicon';
            favicon.src = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain) + '&sz=128';
            favicon.alt = domain;

            var label = document.createElement('span');
            label.className = 'feed-card-domain';
            label.textContent = domain;

            ph.appendChild(favicon);
            ph.appendChild(label);
        }

        return ph;
    }

    function renderCard(data) {
        var card = document.createElement('div');
        card.className = 'feed-card';

        var media = document.createElement('div');
        media.className = 'feed-card-media';

        if (data.thumbnail) {
            var img = document.createElement('img');
            img.className = 'feed-card-image';
            img.src = data.thumbnail;
            img.alt = data.title;
            img.onerror = function () {
                media.replaceChild(makePlaceholder(data.link), img);
            };
            media.appendChild(img);
        } else {
            media.appendChild(makePlaceholder(data.link));
        }

        card.appendChild(media);

        var body = document.createElement('div');
        body.className = 'feed-card-body';

        var date = document.createElement('div');
        date.className = 'feed-card-date';
        date.textContent = formatDate(data.pubDate);

        var title = document.createElement('h3');
        title.className = 'feed-card-title';
        var titleLink = document.createElement('a');
        titleLink.href = data.link;
        titleLink.target = '_blank';
        titleLink.rel = 'noopener noreferrer';
        titleLink.textContent = data.title;
        title.appendChild(titleLink);

        var desc = document.createElement('p');
        desc.className = 'feed-card-desc';
        desc.textContent = truncate(stripHtml(data.description), MAX_DESC);

        var link = document.createElement('a');
        link.className = 'feed-card-link';
        link.href = data.link;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = 'Read more →';

        body.appendChild(date);
        body.appendChild(title);
        body.appendChild(desc);
        body.appendChild(link);
        card.appendChild(body);

        return card;
    }

    fetch(FEED_URL)
        .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
        })
        .then(function (xmlText) {
            var parser = new DOMParser();
            var doc = parser.parseFromString(xmlText, 'application/xml');

            var parseError = doc.querySelector('parsererror');
            if (parseError) throw new Error('Invalid RSS feed');

            var items = Array.prototype.slice.call(doc.getElementsByTagName('item'), 0, MAX_ITEMS);

            loading.remove();

            if (items.length === 0) {
                error.style.display = 'block';
                error.textContent = 'No posts found.';
                return;
            }

            items.forEach(function (item) {
                grid.appendChild(renderCard({
                    title:       getText(item, 'title'),
                    link:        getText(item, 'link'),
                    pubDate:     getText(item, 'pubDate'),
                    description: getText(item, 'description'),
                    thumbnail:   getThumbnail(item)
                }));
            });
        })
        .catch(function (err) {
            loading.remove();
            error.style.display = 'block';
            error.textContent = 'Failed to load posts: ' + err.message;
        });
})();
</script>
{{- end }}
