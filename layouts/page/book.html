{{ define "content" }}
<style>
.book-content p:has(img) {
    float: left;
    max-width: 40%;
    margin: 0 2rem 1rem 0;
}
.book-content p:has(img) img {
    display: block !important;
    max-width: 100% !important;
    float: none !important;
    margin: 0 !important;
}
.book-form {
    clear: both;
    margin-top: 2rem;
}
@media (max-width: 640px) {
    .book-content p:has(img) {
        float: none;
        max-width: 100%;
        margin-right: 0;
    }
}
</style>
<div class="post-warp archive">
    <h2 class="post-title">{{ .Title }}</h2>
    <div class="post-content book-content">
        {{ .Content }}
    </div>
    <div class="book-form">
        <iframe data-tally-src="https://tally.so/embed/kdOEoR?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="349" frameborder="0" marginheight="0" marginwidth="0" title="Book Embedded"></iframe>
        <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
    </div>
</div>
{{ end }}
